services:
  # 后端服务
  app:
    image: ghcr.io/kexience/cloudflare-tunnel:latest
    container_name: cloudflared-tunnel-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - sqlite_data:/app/data
    environment:
      # 应用配置
      - APP_ENV=${APP_ENV:-production}
      - APP_PORT=8083

      # 数据库配置
      - DB_DRIVER=${DB_DRIVER:-sqlite3}
      - DB_DSN=${DB_DSN:-file:/app/data/cloudflared-tunnel.db?cache=shared&_fk=1}

      # 安全配置（必填）
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - CREDENTIAL_SECRET=${CREDENTIAL_SECRET}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8083/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务（Nginx）
  web:
    image: ghcr.io/kexience/cloudflare-tunnel-frontend:latest
    container_name: cloudflared-tunnel-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      app:
        condition: service_healthy

volumes:
  sqlite_data:
